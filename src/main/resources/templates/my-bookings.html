<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Bookings')}"></head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar('my-bookings')}"></div>
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <main class="main-content">
        <h1 style="font-family: 'Anybody', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: -0.32px; margin-bottom: var(--space-2);">Your Bookings</h1>
        <p style="color: var(--color-text-secondary); margin-bottom: var(--space-6);">Keep track of your games and upcoming sessions.</p>

        <!-- Stats -->
        <div class="booking-stats-row" id="statsRow">
            <div class="booking-stat-card">
                <div class="stat-label">THIS MONTH</div>
                <div class="stat-value" id="thisMonthCount">-</div>
            </div>
            <div class="booking-stat-card">
                <div class="stat-label">UPCOMING</div>
                <div class="stat-value" id="upcomingCount">-</div>
            </div>
        </div>

        <!-- Upcoming Matches -->
        <div style="margin-bottom: var(--space-8);">
            <div class="section-header">
                <h2>Upcoming Matches</h2>
                <a href="#" style="color: var(--color-text-secondary); font-size: 14px; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: var(--space-1);">
                    View All
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
                </a>
            </div>
            <div class="upcoming-grid" id="upcomingGrid">
                <!-- populated by JS -->
            </div>
        </div>

        <!-- Past Bookings -->
        <div>
            <div class="section-header">
                <h2>Past Bookings</h2>
            </div>
            <div class="table-container" id="pastBookingsTable">
                <table>
                    <thead>
                        <tr>
                            <th>Court</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pastBookingsBody">
                        <tr><td colspan="5" style="text-align: center; color: var(--color-text-secondary);">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/bottomnav :: bottomnav('my-bookings')}"></div>

    <script>
    const token = localStorage.getItem('token');

    function loadBookings() {
        if (!token) {
            document.getElementById('upcomingGrid').innerHTML = '<p style="color: var(--color-text-secondary);">Please login to view your bookings.</p>';
            document.getElementById('pastBookingsBody').innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--color-text-secondary);"><a href="/login" style="color: var(--color-accent-primary);">Login here</a></td></tr>';
            return;
        }

        fetch('/api/bookings/me', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.json())
            .then(bookings => {
                const upcoming = bookings.filter(b => b.status === 'CONFIRMED' || b.status === 'PENDING_PAYMENT');
                const past = bookings.filter(b => b.status === 'COMPLETED' || b.status === 'CANCELLED');

                document.getElementById('thisMonthCount').textContent = bookings.filter(b => b.status !== 'CANCELLED').length;
                document.getElementById('upcomingCount').textContent = upcoming.length;

                // Upcoming grid
                const grid = document.getElementById('upcomingGrid');
                if (upcoming.length === 0) {
                    grid.innerHTML = `
                        <div class="booking-card empty-state-card" style="grid-column: 1/-1;">
                            <div class="icon-circle">📅</div>
                            <h3>Book Another</h3>
                            <p style="color: var(--color-text-secondary);">No upcoming matches yet.<br>Browse courts and book your next game.</p>
                            <a href="/booking" class="btn-primary" style="padding: 12px 32px;">Browse Courts</a>
                        </div>
                    `;
                } else {
                    grid.innerHTML = upcoming.map(b => {
                        const statusClass = b.status === 'CONFIRMED' ? 'confirmed' : 'pending';
                        const statusLabel = b.status === 'CONFIRMED' ? 'Confirmed' : 'Pending Payment';
                        return `
                            <div class="booking-card">
                                <div class="booking-card-image">
                                    <div style="position: absolute; inset: 0; background: linear-gradient(to top, var(--color-bg-primary) 0%, rgba(8,20,37,0) 100%);"></div>
                                    <span class="badge badge-lime" style="position: absolute; top: var(--space-3); right: var(--space-3);">${statusLabel}</span>
                                </div>
                                <div class="booking-card-body">
                                    <h3>${b.courtName}</h3>
                                    <div class="booking-detail-row">
                                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zM4 8h12v8H4V8z" clip-rule="evenodd"/></svg>
                                        ${b.date}
                                    </div>
                                    <div class="booking-detail-row">
                                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
                                        ${b.startTime} - ${b.endTime}
                                    </div>
                                    <div class="booking-card-actions">
                                        ${b.status === 'PENDING_PAYMENT' ? `<button class="btn-primary" onclick="payBooking(${b.id})">Pay Now</button>` : ''}
                                        <button class="btn-secondary" onclick="cancelBooking(${b.id})">${b.status === 'PENDING_PAYMENT' ? 'Cancel' : 'Reschedule'}</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                // Past bookings table
                const tbody = document.getElementById('pastBookingsBody');
                if (past.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--color-text-secondary);">No past bookings yet.</td></tr>';
                } else {
                    tbody.innerHTML = past.map(b => `
                        <tr>
                            <td>${b.courtName}</td>
                            <td>${b.date}</td>
                            <td>${b.startTime} - ${b.endTime}</td>
                            <td><span class="status-dot ${b.status.toLowerCase()}"></span>${b.status}</td>
                            <td>
                                <button style="background: none; border: 1px solid var(--color-border-default); color: var(--color-text-tertiary); padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer;">View</button>
                            </td>
                        </tr>
                    `).join('');
                }
            })
            .catch(() => {
                document.getElementById('upcomingGrid').innerHTML = '<p style="color: var(--color-text-secondary);">Failed to load bookings.</p>';
            });
    }

    function cancelBooking(id) {
        if (!confirm('Cancel this booking?')) return;
        fetch(`/api/bookings/${id}`, {
            method: 'PATCH',
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(r => r.json())
        .then(() => { loadBookings(); })
        .catch(() => { alert('Failed to cancel. Please login.'); });
    }

    function payBooking(id) {
        fetch(`/api/bookings/${id}/pay`, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(r => r.json())
        .then(() => { loadBookings(); })
        .catch(() => { alert('Payment failed.'); });
    }

    document.addEventListener('DOMContentLoaded', loadBookings);
    </script>
</body>
</html>
