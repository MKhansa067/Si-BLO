spring.application.name=siblo-rent

# H2 Database
spring.datasource.url=jdbc:h2:mem:siblodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true


# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# JWT
app.jwt.secret=siblo-secret-key-change-in-production-must-be-at-least-256-bits-long-2024
app.jwt.expiration-ms=86400000

# Booking config
app.booking.payment-timeout-minutes=15
app.booking.cancel-cutoff-hours=24

# Scheduling (fix1)
app.scheduling.slot-horizon-days=14
app.scheduling.slot-extend-cron=0 0 1 * * *
app.scheduling.payment-expiry-fixed-rate-ms=60000
app.scheduling.lifecycle-fixed-rate-ms=300000
app.scheduling.date-scroller-days=14

# Midtrans
midtrans.server-key=Mid-server-xxxxxxxxxxxxxxxx
midtrans.client-key=Mid-client-xxxxxxxxxxxxxxxx
midtrans.is-production=false

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=si.bookinglapangonline@gmail.com
spring.mail.password=xxxxxxxxxxxxxxxxxxxx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
